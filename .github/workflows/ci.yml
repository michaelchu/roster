name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test -- --run

      - name: Setup Supabase CLI
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: supabase/setup-cli@v1
        with:
          version: 2.67.1

      - name: Start Supabase local instance
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: supabase start

      - name: Get Supabase credentials
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          supabase status
          echo "VITE_SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> $GITHUB_ENV

      - name: Cache Playwright browsers
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: npx playwright install --with-deps

      - name: Run E2E tests
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: npm run test:e2e

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-files
          path: dist/
          retention-days: 7